name: privado_ssi_poc
description: "Privado ID / PolygonID SSI PoC (DID + QR cred)"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  
  path_provider: ^2.1.1

  cupertino_icons: ^1.0.8


  flutter_secure_storage: ^9.0.0

  
  mobile_scanner: ^7.2.0
  permission_handler: ^11.3.1


  polygonid_flutter_sdk:
    path: Z:/deps/polygonid-flutter-sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


dependency_overrides:
  uuid: ^4.0.0
  pointycastle: 4.0.0
  http: ^1.3.0
  intl: ^0.19.0

flutter:
  uses-material-design: true 
  
  assets:
    - assets/authV2.wcd
    - assets/authV2.zkey
    