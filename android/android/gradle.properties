# =========================================
# Gradle / JVM memory & encoding
# =========================================
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# =========================================
# AndroidX
# =========================================
android.useAndroidX=true
android.enableJetifier=true

# =========================================
# Kotlin daemon stability
# =========================================
kotlin.daemon.jvmargs=-Xmx2048m

# Workaround for: "Daemon compilation failed: null"
# Runs Kotlin compiler in-process instead of using Kotlin daemon
kotlin.compiler.execution.strategy=in-process

# =========================================
# Gradle performance / caching
# =========================================
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Optional: reduces configuration time
org.gradle.configureondemand=true